name: Instagram Monitor

on:
  repository_dispatch:
    types: [ trigger_cron ] # Название события для cron-job.com
  workflow_dispatch: # Позволит запускать скрипт вручную кнопкой из панели GitHub

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-base: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install instaloader requests

    - name: Run Monitor Script
      env:
        GIST_ID: "a6b6a3b65227c04c494acb98e8b84895"
        GIST_TOKEN: ${{ secrets.GIST_TOKEN }} # Новый токен положите сюда в настройках репозитория
        INSTA_USER: ${{ secrets.INSTA_USER }}
        INSTA_PASSWORD: ${{ secrets.INSTA_PASSWORD }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      run: python monitor.py
